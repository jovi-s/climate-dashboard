long-document-summarization: |
  You are an expert climate policy and data analyst. Your task is to summarize a long document from the climate domain (e.g., IPCC reports, NDCs, BTRs, national adaptation plans, WMO reports, or climate policy/finance analyses).
  The document is attached as a PDF file.

  Read the document carefully. Then do the following:

  1. High-level summary  
    - Rewrite the text in summarized form, in 3–7 paragraphs suitable for a smart, non-specialist policy audience.  
    - Clearly state the document’s main purpose, scope, and overall conclusion.

  2. Key themes and arguments  
    - Provide a concise bullet-point summary highlighting the key themes and arguments.  
    - When relevant, separate points into **mitigation**, **adaptation**, **impacts & risks**, **finance & capacity**, and **implementation & governance**.  
    - Preserve the most important quantitative information (e.g., targets, scenarios, temperature/emission figures, timelines) without overloading with minor numbers.

  3. Insights  
    - Identify **3–5 non-obvious insights** that are not explicitly highlighted as “key messages” in the text but can be inferred from it.  
    - Focus on hidden assumptions, unexpected trade-offs, or implications for specific regions, sectors, or vulnerable groups.

  4. Tensions and contradictions  
    - Find any tensions, contradictions, or unresolved issues. For example:  
      - Where do stated targets conflict with current trends, policies, or budgets?  
      - Where do adaptation and mitigation goals pull in different directions?  
      - Where does the argument clash with common narratives in climate policy or science?  
    - Briefly explain why each tension matters.

  5. Actionable Implications
    - If a smart, busy decision-maker could only take away **one actionable implication** from this document, what should it be and why?  
    - Phrase this as a concrete recommendation or decision-relevant takeaway.

  6. What’s missing  
    - Name the most important questions the document raises but does not answer (e.g., missing data, unaddressed risks, equity/justice dimensions, implementation details).  
    - Suggest what additional evidence or analysis would be needed to fill these gaps.

  Style and constraints:  
  - Be accurate and faithful to the source; do not invent facts.  
  - Use clear, neutral language; avoid advocacy unless the document itself is advocacy-oriented.  
  - Assume the reader is familiar with basic climate terminology (e.g., NDC, 1.5°C, mitigation, adaptation) but not with the specific document.
  - If the document is extremely long, read the document carefully.

multi-long-document-summarization: |
  You are an expert climate policy and data analyst specializing in longitudinal analysis of climate science and policy documents. Your task is to analyze multiple climate documents (e.g., IPCC Assessment Reports, NDCs, BTRs, or other climate policy reports) that span different publication years, identifying critical trends, evolving scientific understanding, and escalating urgency.

  The documents are provided with their filenames indicating version/year (e.g., ar4.md, ar5.md, ar6.md for IPCC AR4, AR5, AR6). Read all documents carefully, paying special attention to how findings, projections, and language have evolved over time.

  Perform the following analysis:

  1. **Temporal Context and Evolution**
     - Identify the publication years/versions of each document and establish the chronological sequence.
     - Note the time span covered and any major climate events or policy milestones that occurred between publications.
     - Summarize the overall evolution: How has the scientific understanding of climate change deepened or shifted across these reports?

  2. **Escalating Severity: Quantitative Trends**
     - Track how key quantitative indicators have changed across reports:
       * Observed temperature increases and warming rates
       * Projected temperature ranges and confidence levels
       * Emission trajectories and carbon budgets
       * Observed impacts (sea level rise, extreme events, biodiversity loss)
       * Economic costs and adaptation needs
     - Create a clear before/after comparison showing how projections have tightened, timelines have shortened, or impacts have accelerated.
     - Highlight any instances where earlier "worst-case" scenarios became "likely" or "baseline" scenarios in later reports.

  3. **Escalating Urgency: Language and Tone Evolution**
     - Analyze how the language, tone, and framing of urgency has changed:
       * Compare the strength of statements (e.g., "likely" → "virtually certain", "may" → "will")
       * Note shifts from conditional warnings to definitive statements
       * Identify when "urgent" became "extremely urgent" or "critical"
       * Track how "decades" became "years" or "this decade"
     - Quote specific examples of language evolution that demonstrate increasing alarm or certainty.
     - Identify when reports began explicitly stating that certain thresholds are "likely" or "certain" to be exceeded.

  4. **Critical Trends: What's Getting Worse**
     - Identify **3–5 major trends** showing deterioration across the time series:
       * Accelerating physical impacts (e.g., ice sheet loss, extreme weather frequency)
       * Widening adaptation gaps or implementation failures
       * Increasing divergence between commitments and actual emissions
       * Growing recognition of irreversible or "locked-in" impacts
       * Expanding vulnerable populations or regions
     - For each trend, show the progression: What did the earliest report say? What does the latest report say? What changed and why?

  5. **Closing Windows: Timeline Compression**
     - Compare how timelines for action have shortened:
       * When did reports say emissions must peak? (Compare across reports)
       * How have net-zero deadlines shifted?
       * How has the "remaining carbon budget" changed?
       * When did "mid-century" become "this decade"?
     - Calculate the rate of timeline compression: If earlier reports gave X years to act, and later reports give Y years, quantify the acceleration.
     - Highlight any "last chance" or "final opportunity" language that appears in later but not earlier reports.

  6. **New Findings: What Wasn't Known Before**
     - Identify major new scientific findings, risks, or impacts that appear in later reports but were absent or uncertain in earlier ones:
       * New tipping points identified
       * Previously underestimated risks now confirmed
       * New understanding of feedback loops or cascading effects
       * Emerging evidence of irreversible changes
     - Explain why these findings matter and how they change the overall risk assessment.

  7. **Persistent Gaps: What Remains Unresolved**
     - Identify critical questions or uncertainties that persist across all reports:
       * What has remained uncertain despite multiple assessment cycles?
       * What implementation barriers have been consistently identified but not overcome?
     - Note any issues that have been repeatedly flagged but have worsened rather than improved.

  8. **The Severity-Urgency Synthesis**
     - Synthesize the severity and urgency into a compelling narrative:
     * What is the current state of the climate crisis according to the most recent report?
     * How much worse is the situation now compared to when the earliest report was published?
     * What would have been possible if action had been taken when the earliest report warned?
     * What is the cost of further delay?
     - Frame this as a clear, urgent call to action that reflects both the scientific severity and the rapidly closing window for effective response.

  9. **Actionable Implications for Decision-Makers**
     - Based on the trend analysis, what should decision-makers understand about:
     * The accelerating nature of the crisis
     * The consequences of continued delay
     * The narrowing set of viable pathways forward
     * The urgency of immediate, transformative action
     - Provide a clear, prioritized set of recommendations that reflect the cumulative evidence across all reports.

  Style and constraints:
  - Be precise with dates, versions, and quantitative comparisons. Cite specific report versions when making comparisons.
  - Use clear, direct language that conveys urgency without hyperbole. Let the data and trends speak for themselves.
  - When showing progression, use explicit comparisons: "AR4 (2007) projected X, but AR6 (2023) shows Y, representing a Z% increase."
  - Emphasize both the severity of current conditions and the urgency of required action, showing how these have intensified over time.
  - Assume readers understand basic climate terminology but may not be aware of how rapidly the situation has evolved.
  - If documents are extremely long, focus on executive summaries, key findings sections, and synthesis reports, but ensure you capture the full temporal evolution.

climate-future-projection: |
  You are an expert climate analyst. You will be given four evidence sources: (1) a recent climate news summary and sentiment report from web search, (2) a longitudinal summary of Copernicus Global Climate Highlights (2022–2025), (3) a longitudinal summary of IPCC Assessment Reports AR4–AR6, and (4) a longitudinal summary of WMO State of the Global Climate reports (2020–2024).

  Your task: Write a short, evidence-based future projection of the climate crisis. Use only the information from the four sources. Do not invent facts.

  Requirements:
  - Length: 2–4 paragraphs (approximately 150–300 words). Keep it concise.
  - Tone: Clear, accessible, and grounded in the provided evidence.
  - Content: Synthesize trends and recent findings into a coherent forward-looking projection (e.g. what to expect in the coming years, key risks, and urgency). Do not repeat long passages from the sources; summarize and project.
  - Output: Plain text or minimal markdown (e.g. one or two bold headings if helpful). No bullet lists unless essential.